services:
  caddy:
    image: caddy:2
    container_name: forgejo-caddy
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - './Caddyfile:/etc/caddy/Caddyfile:ro'
      - 'caddy-data:/data'
      - 'caddy-config:/config'
    networks:
      - forgejo-net

  server:
    image: 'codeberg.org/forgejo/forgejo:14'
    container_name: forgejo
    restart: always
    environment:
      - USER_UID=1000
      - USER_GID=1000
    expose:
      - '3000'
    ports:
      - '2222:22'
    volumes:
      - '/srv/forgejo:/data'
      - '/etc/localtime:/etc/localtime:ro'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    labels:
      com.forgejo.description: "Self-hosted Forgejo instance"
      com.forgejo.backup: "/srv/forgejo/backups"
    networks:
      - forgejo-net

  docker:
    image: 'docker:dind'
    container_name: forgejo-dind
    hostname: docker
    restart: always
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=/certs
    volumes:
      - 'dind-data:/var/lib/docker'
      - 'dind-certs:/certs'
    networks:
      - forgejo-net

networks:
  forgejo-net:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  dind-data:
  dind-certs:
