services:
  server:
    image: 'codeberg.org/forgejo/forgejo:14'
    container_name: forgejo
    restart: always
    environment:
      - USER_UID=1000
      - USER_GID=1000
    ports:
      - '3000:3000'
      - '2222:22'
    volumes:
      - '/srv/forgejo:/data'
      - '/etc/localtime:/etc/localtime:ro'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    labels:
      com.forgejo.description: "Self-hosted Forgejo instance"
      com.forgejo.backup: "/srv/forgejo/backups"
    networks:
      - forgejo-net

networks:
  forgejo-net:
    driver: bridge
