services:
  server:
    image: 'codeberg.org/forgejo/forgejo:14'
    container_name: forgejo
    restart: always
    environment:
      - USER_UID=1000
      - USER_GID=1000
    ports:
      - '3000:3000'
      - '2222:22'
    volumes:
      - '/srv/forgejo:/data'
      - '/etc/localtime:/etc/localtime:ro'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    labels:
      com.forgejo.description: "Self-hosted Forgejo instance"
      com.forgejo.backup: "/srv/forgejo/backups"
    networks:
      - forgejo-net

  docker:
    image: 'docker:dind'
    container_name: forgejo-dind
    hostname: docker
    restart: always
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=/certs
    volumes:
      - 'dind-data:/var/lib/docker'
      - 'dind-certs:/certs'
    networks:
      - forgejo-net

  runner:
    image: 'code.forgejo.org/forgejo/runner:6'
    container_name: forgejo-runner
    restart: always
    depends_on:
      - server
      - docker
    environment:
      - FORGEJO_INSTANCE_URL=http://kalameet:3000
      - FORGEJO_RUNNER_REGISTRATION_TOKEN=${RUNNER_TOKEN}
      - DOCKER_HOST=tcp://docker:2376
      - DOCKER_TLS_VERIFY=1
      - DOCKER_CERT_PATH=/certs/client
    volumes:
      - '/srv/forgejo-runner:/data'
      - 'dind-certs:/certs:ro'
    networks:
      - forgejo-net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -f /data/.runner ]; then
          forgejo-runner register \
            --instance $$FORGEJO_INSTANCE_URL \
            --token $$FORGEJO_RUNNER_REGISTRATION_TOKEN \
            --name forgejo-runner \
            --no-interactive
        fi && forgejo-runner daemon
    labels:
      com.forgejo.description: "Forgejo Actions Runner"

networks:
  forgejo-net:
    driver: bridge

volumes:
  dind-data:
  dind-certs:
